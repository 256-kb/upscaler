<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Local AI Upscaler</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>

<header>
    <h1>Local AI Upscaler</h1>

    <button id="themeButton">
        Mode sombre
    </button>
</header>



<main>


<section class="card">

<h2>Image source</h2>

<input 
type="file"
id="imageInput"
accept="image/*">


<div class="imageBox">
<img id="originalPreview">
</div>


<p id="originalInfo">
Aucune image chargée
</p>


</section>




<section class="card">

<h2>Paramètres</h2>


<label>
Modèle
</label>

<select id="modelSelect">

<option value="quality">
Qualité (FLOAT)
</option>

<option value="speed">
Vitesse (W8A8)
</option>

</select>



<label>
Facteur d'agrandissement
</label>

<select id="scaleSelect">

<option value="2">
×2
</option>

<option value="4" selected>
×4
</option>

<option value="8">
×8
</option>

</select>



<button id="runButton">
Lancer l'upscale
</button>



<div class="progressContainer">

<progress 
id="progressBar"
value="0"
max="100">
</progress>

<p id="status">
En attente
</p>

</div>


</section>





<section class="card">

<h2>Résultat</h2>


<div class="imageBox">

<img id="resultPreview">

</div>


<p id="resultInfo">
Aucun résultat
</p>



<button id="saveButton">
Enregistrer l'image
</button>


</section>



</main>



<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<script src="app.js"></script>


</body>

</html>
