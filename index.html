<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Upscaler</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>AI Image Upscaler</h1>

<button id="themeButton">
Mode
</button>

</header>



<main>


<section class="box">


<h2>Image originale</h2>


<input 
type="file"
id="imageInput"
accept="image/*"
>



<img 
id="originalPreview"
>



<p id="originalInfo"></p>


</section>





<section class="box">


<h2>Paramètres</h2>


<label>
Modèle :
</label>


<select id="modelSelect">

<option value="speed">
Vitesse - RealESR General x4v3
</option>


<option value="quality">
Qualité - RealESRGAN x4plus
</option>


</select>



<br><br>



<label>
Facteur :
</label>


<select id="scaleSelect">

<option value="2">
x2
</option>


<option value="4" selected>
x4
</option>


<option value="8">
x8
</option>


</select>



<br><br>


<button id="runButton">
Lancer Upscale
</button>



<button id="saveButton">
Enregistrer PNG
</button>



</section>





<section class="box">


<h2>Progression</h2>


<progress 
id="progressBar"
value="0"
max="100">
</progress>


<p id="status">
Prêt
</p>



</section>





<section class="box">


<h2>Résultat</h2>



<img 
id="resultPreview"
>



<p id="resultInfo"></p>


</section>



</main>





<!-- ONNX Runtime Web -->

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>


<!-- Ton application -->

<script src="app.js"></script>



</body>

</html>
